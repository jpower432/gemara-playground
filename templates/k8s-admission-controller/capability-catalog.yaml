title: Kubernetes Admission Controller Capability Catalog
metadata:
  id: K8S.AC.CAP
  type: CapabilityCatalog
  gemara-version: "1.0.0-rc.1"
  description: >-
    Baseline capabilities for Kubernetes admission controllers
    (validating and mutating webhooks). Use as a starting point
    for threat assessment — extend with project-specific capabilities.
  version: "0.1.0"
  author:
    id: gide-template
    name: GIDE Template
    type: Software
groups:
  - id: request-processing
    title: Request Processing
    description: >-
      Capabilities related to intercepting, inspecting, and
      deciding on Kubernetes API requests.
  - id: policy-enforcement
    title: Policy Enforcement
    description: >-
      Capabilities related to enforcing organizational policies
      on cluster resources.
  - id: cluster-integration
    title: Cluster Integration
    description: >-
      Capabilities related to integration with the Kubernetes
      API server and cluster infrastructure.
capabilities:
  - id: K8S.AC.CAP01
    title: API Request Interception
    description: >-
      Intercepts Kubernetes API server requests via webhook
      configuration, receiving AdmissionReview payloads for
      configured resource types and operations.
    group: request-processing
  - id: K8S.AC.CAP02
    title: Resource Mutation
    description: >-
      Modifies Kubernetes resource specifications before
      persistence by returning JSON patches in AdmissionReview
      responses (mutating webhook).
    group: request-processing
  - id: K8S.AC.CAP03
    title: Request Validation and Denial
    description: >-
      Evaluates Kubernetes resource specifications against
      policy rules and returns allow/deny decisions with
      human-readable denial messages.
    group: policy-enforcement
  - id: K8S.AC.CAP04
    title: TLS Certificate Management
    description: >-
      Manages TLS certificates for the webhook HTTPS endpoint,
      including certificate generation, rotation, and CA bundle
      distribution to the API server.
    group: cluster-integration
  - id: K8S.AC.CAP05
    title: Policy Configuration Loading
    description: >-
      Loads and watches policy definitions from cluster resources
      (ConfigMaps, CRDs, or external sources) to determine
      admission rules at runtime.
    group: policy-enforcement
  - id: K8S.AC.CAP06
    title: Webhook Registration
    description: >-
      Registers and manages ValidatingWebhookConfiguration or
      MutatingWebhookConfiguration resources that bind the
      controller to the API server's admission chain.
    group: cluster-integration
