title: Kubernetes Admission Controller Threat Catalog
metadata:
  id: K8S.AC.THR
  type: ThreatCatalog
  gemara-version: "1.0.0-rc.1"
  description: >-
    Baseline STRIDE threats for Kubernetes admission controllers.
    Use as a starting point — extend with project-specific threats
    based on repository context.
  version: "0.1.0"
  author:
    id: gide-template
    name: GIDE Template
    type: Software
  mapping-references:
    - id: K8S.AC.CAP
      title: Kubernetes Admission Controller Capability Catalog
      version: "0.1.0"
      description: >-
        Baseline capabilities for this admission controller assessment.
groups:
  - id: spoofing
    title: Spoofing
    description: Threats involving impersonation of users, services, or components
  - id: tampering
    title: Tampering
    description: Threats involving unauthorized modification of data, configuration, or code
  - id: repudiation
    title: Repudiation
    description: Threats involving actions performed without accountability mechanisms
  - id: information-disclosure
    title: Information Disclosure
    description: Threats involving exposure of sensitive data to unauthorized parties
  - id: denial-of-service
    title: Denial of Service
    description: Threats involving disruption of service availability or resources
  - id: elevation-of-privilege
    title: Elevation of Privilege
    description: Threats involving unauthorized access beyond intended permissions
threats:
  - id: K8S.AC.THR01
    title: Webhook Endpoint Impersonation
    description: >-
      An attacker deploys a rogue service that impersonates the admission
      webhook endpoint. If the API server's webhook configuration points
      to a compromised or attacker-controlled URL, all admission requests
      are routed to the attacker, enabling silent approval of malicious
      workloads or exfiltration of resource specifications.
    group: spoofing
    capabilities:
      - reference-id: K8S.AC.CAP
        entries:
          - reference-id: K8S.AC.CAP01
          - reference-id: K8S.AC.CAP04
  - id: K8S.AC.THR02
    title: Policy Configuration Tampering
    description: >-
      An attacker with write access to policy storage (ConfigMaps, CRDs,
      or external policy repos) modifies admission rules to weaken or
      disable enforcement. Privileged workloads or insecure configurations
      pass admission checks that should have blocked them.
    group: tampering
    capabilities:
      - reference-id: K8S.AC.CAP
        entries:
          - reference-id: K8S.AC.CAP05
  - id: K8S.AC.THR03
    title: Webhook Configuration Tampering
    description: >-
      An attacker with RBAC permissions to modify ValidatingWebhookConfiguration
      or MutatingWebhookConfiguration changes the failure policy, namespace
      selectors, or resource rules to bypass admission enforcement for
      targeted namespaces or resource types.
    group: tampering
    capabilities:
      - reference-id: K8S.AC.CAP
        entries:
          - reference-id: K8S.AC.CAP06
  - id: K8S.AC.THR04
    title: Admission Decision Repudiation
    description: >-
      The admission controller lacks sufficient audit logging for
      allow/deny decisions. When a security incident occurs, there is
      no verifiable record of which requests were admitted, denied, or
      mutated, preventing effective incident response.
    group: repudiation
    capabilities:
      - reference-id: K8S.AC.CAP
        entries:
          - reference-id: K8S.AC.CAP03
          - reference-id: K8S.AC.CAP02
  - id: K8S.AC.THR05
    title: Secret Exposure via AdmissionReview Payloads
    description: >-
      AdmissionReview payloads may contain sensitive data (Secrets,
      credentials in environment variables, service account tokens).
      If the webhook endpoint logs full request payloads or transmits
      them to external systems, sensitive data is exposed.
    group: information-disclosure
    capabilities:
      - reference-id: K8S.AC.CAP
        entries:
          - reference-id: K8S.AC.CAP01
  - id: K8S.AC.THR06
    title: Admission Controller Denial of Service
    description: >-
      An attacker floods the cluster with resource creation requests,
      overwhelming the admission webhook. If the webhook's failure
      policy is set to Fail, legitimate requests are also denied.
      If set to Ignore, the flood bypasses admission entirely.
    group: denial-of-service
    capabilities:
      - reference-id: K8S.AC.CAP
        entries:
          - reference-id: K8S.AC.CAP01
          - reference-id: K8S.AC.CAP03
  - id: K8S.AC.THR07
    title: Privilege Escalation via Mutating Webhook
    description: >-
      A compromised or misconfigured mutating webhook injects privileged
      security contexts, host mounts, or elevated capabilities into pod
      specifications. Workloads arrive in the cluster with privileges
      beyond what the original request specified.
    group: elevation-of-privilege
    capabilities:
      - reference-id: K8S.AC.CAP
        entries:
          - reference-id: K8S.AC.CAP02
