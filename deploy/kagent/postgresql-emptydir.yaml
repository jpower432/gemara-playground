# SPDX-License-Identifier: Apache-2.0
#
# Standalone PostgreSQL with emptyDir — bypasses local-path-provisioner.
# Data does not survive pod restarts. For dev/testing only.
---
apiVersion: v1
kind: Secret
metadata:
  name: kagent-postgresql
  namespace: kagent
type: Opaque
stringData:
  POSTGRES_PASSWORD: kagent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-postgresql
  namespace: kagent
  labels:
    app.kubernetes.io/name: kagent-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kagent-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-postgresql
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
      containers:
        - name: postgresql
          image: docker.io/library/postgres:18
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: kagent
            - name: POSTGRES_USER
              value: kagent
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kagent-postgresql
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kagent-postgresql
  namespace: kagent
spec:
  selector:
    app.kubernetes.io/name: kagent-postgresql
  ports:
    - port: 5432
      targetPort: 5432
