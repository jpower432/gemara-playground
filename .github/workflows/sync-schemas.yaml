# SPDX-License-Identifier: Apache-2.0
name: Sync Schemas

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Gemara Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - name: Sync schemas from registry
        run: make sync-schemas
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet web/versions.json web/schemas/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="chore/sync-schemas-$(date +%Y%m%d)"
          git checkout -b "$branch"
          git add web/versions.json web/schemas/
          git commit -m "chore: sync Gemara schemas from registry"
          git push -u origin "$branch"
          gh pr create \
            --title "chore: sync Gemara schemas from registry" \
            --body "Automated daily sync detected new Gemara versions in the CUE registry." \
            --base main
