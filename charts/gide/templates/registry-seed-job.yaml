{{- if and .Values.registry.enabled .Values.registry.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: gide-seed-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gide.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-registry
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              until wget -qO- http://gide-registry.{{ .Release.Namespace }}:{{ .Values.registry.service.port }}/v2/ >/dev/null 2>&1; do
                echo "Waiting for registry..."
                sleep 2
              done
              echo "Registry ready"
      containers:
        - name: seed
          image: {{ .Values.registry.seed.image }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              REGISTRY="gide-registry.{{ .Release.Namespace }}:{{ .Values.registry.service.port }}"

              echo "Pushing threat catalog..."
              oras push --plain-http --disable-path-validation \
                "${REGISTRY}/gide/samples/threat-catalog:v1.0.0" \
                /samples/threat-catalog.yaml:application/vnd.gemara.threat-catalog.layer.v1+yaml

              echo "Pushing control catalog..."
              oras push --plain-http --disable-path-validation \
                "${REGISTRY}/gide/samples/control-catalog:v1.0.0" \
                /samples/control-catalog.yaml:application/vnd.gemara.control-catalog.layer.v1+yaml

              echo "Pushing guidance catalog..."
              oras push --plain-http --disable-path-validation \
                "${REGISTRY}/gide/samples/guidance-catalog:v1.0.0" \
                /samples/guidance-catalog.yaml:application/vnd.gemara.guidance-catalog.layer.v1+yaml

              echo "All samples pushed successfully"
          volumeMounts:
            - name: samples
              mountPath: /samples
              readOnly: true
      volumes:
        - name: samples
          configMap:
            name: gide-registry-samples
{{- end }}
