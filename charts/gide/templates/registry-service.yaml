# SPDX-License-Identifier: Apache-2.0
{{- if .Values.registry.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: gide-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gide.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "gide.selectorLabels" (dict "component" "gide-registry" "root" .) | nindent 4 }}
  ports:
    - port: {{ .Values.registry.service.port }}
      targetPort: 5000
      name: registry
  type: {{ .Values.registry.service.type }}
{{- end }}
